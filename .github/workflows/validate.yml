name: Validate Code

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format_check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/bootstrap
      - shell: bash
        run: bun format-check

  type_check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/bootstrap
      - shell: bash
        run: bun type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/bootstrap
      - shell: bash
        run: bun lint

  test_source_bun:
    name: Test Source - Bun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/bootstrap
      - shell: bash
        run: bun pw test

  test_build_node:
    name: Test Build - Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/bootstrap
      - shell: bash
        run: bun pw build-and-test:node
